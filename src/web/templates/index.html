<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeRL Multi-Agent Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="app-header">
      <div>
        <h1>VibeRL Agent Studio</h1>
        <p>历史记录 / Chat / 多 Agent 工作视图</p>
      </div>
      <div class="header-meta" id="health-status">连接中...</div>
    </header>

    <main class="layout-grid">
      <section class="panel history-panel">
        <div class="panel-title-row">
          <h2>会话历史</h2>
          <div class="panel-btns">
            <button id="new-conversation-btn" class="ghost-btn" type="button">新建会话</button>
            <button id="refresh-history-btn" class="ghost-btn" type="button">刷新</button>
          </div>
        </div>
        <div class="rag-box">
          <div class="rag-head">RAG 资料库</div>
          <form id="rag-upload-form" class="rag-upload-form">
            <select id="rag-import-type">
              <option value="document">文档(PDF/PPT/TXT)</option>
              <option value="telegram">Telegram 导入</option>
              <option value="chat">第三方聊天导入</option>
              <option value="whatsapp">WhatsApp 导入</option>
              <option value="discord">Discord 导入</option>
              <option value="slack">Slack 导入</option>
            </select>
            <input id="rag-file-input" type="file" accept=".pdf,.ppt,.pptx,.txt,.md,.json" required />
            <button id="rag-upload-btn" type="submit" class="ghost-btn">上传到 RAG</button>
          </form>
          <div id="rag-upload-status" class="rag-upload-status">未上传资料</div>
          <div id="rag-doc-list" class="rag-doc-list"></div>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <section class="panel chat-panel">
        <h2>Chat（多轮）</h2>
        <div id="chat-thread" class="chat-thread"></div>

        <form id="chat-form" class="chat-form">
          <textarea id="query-input" placeholder="输入查询，例如：比较茅台和腾讯的行情、技术指标和风险" required></textarea>
          <div class="chat-form-row">
            <div class="model-switch" role="group" aria-label="模型切换">
              <button id="model-rule-btn" type="button" class="model-btn active" data-model="rule-based" aria-pressed="true">Rule-based</button>
              <button id="model-llm-btn" type="button" class="model-btn" data-model="deepseek-chat" aria-pressed="false">大模型</button>
            </div>
            <span id="model-indicator" class="model-indicator">当前模型: Rule-based</span>
            <label class="stream-toggle">
              <input id="stream-toggle" type="checkbox" checked />
              流式
            </label>
            <label class="stream-toggle">
              <input id="rag-toggle" type="checkbox" checked />
              RAG
            </label>
            <button id="send-btn" type="submit">发送</button>
          </div>
        </form>
      </section>

      <section class="panel agents-panel">
        <div class="panel-title-row">
          <h2>Multi-Agent 工作信息</h2>
          <div class="panel-btns">
            <button id="refresh-debug-btn" class="ghost-btn" type="button">刷新 Debugger</button>
          </div>
        </div>
        <div id="agent-report" class="agent-report empty">请选择历史记录或先发起一次查询。</div>
        <div id="agent-worklog" class="agent-worklog"></div>
        <div class="debugger-panel">
          <div class="rag-head">Debugger 调用记录</div>
          <div id="debugger-list" class="debugger-list"></div>
          <pre id="debugger-detail" class="debugger-detail"></pre>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
